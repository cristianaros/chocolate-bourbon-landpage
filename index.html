<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルフォートミニチョコレート</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for utility classes) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- React & ReactDOM (UMD build for direct browser usage) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Motion (Framer Motion vanilla API - global variable 'Motion') -->
    <script src="https://cdn.jsdelivr.net/npm/motion@11.11.17/dist/motion.js"></script>
</head>
<body>
    <!-- Grain texture overlay -->
    <div class="grain"></div>
    
    <!-- Background layer for scroll color transitions -->
    <div id="bg-layer"></div>
    
    <!-- React Root -->
    <div id="root"></div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
